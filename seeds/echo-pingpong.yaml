# echo-pingpong — smallest possible interactive demo.
#
# Type anything in the chat → it goes out on chat.input → echo
# bounces it back on chat.response → chat displays it. No topic
# dropdown to navigate, no special setup. Chat ignores its own
# publishes via anti-loop, so the only thing it surfaces back is
# echo's reply.

nodes:
  - type: chat
    name: human
    description: "Chat UI — type anything, echo bounces it back."
    priority: 5
    position: { x: 50, y: 250 }

  - type: echo
    name: ping-pong
    description: "Trivial echo — anything on chat.input comes back on chat.response."
    priority: 1
    position: { x: 450, y: 250 }
    subscriptions:
      - topic: "chat.input"
        description: "Anything the user types in the chat."
    config_overrides:
      response_topic: "chat.response"
