<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>brAIn - Consciousness</title>
  <style>
    :root {
      --bg: #0A0A0A;
      --surface: #111111;
      --elevated: #1A1A1A;
      --border: #262626;
      --border-strong: #333333;
      --text: #EDEDED;
      --text-dim: #A1A1A1;
      --text-muted: #707070;
      --accent: #EDEDED;
      --accent-fg: #0A0A0A;
      --danger: #F84E4E;
      --success: #4ADE80;
      --warning: #FBBF24;
      --radius-sm: 4px;
      --radius: 6px;
      --radius-lg: 10px;
      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-5: 24px; --space-6: 32px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      --font-mono: ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: var(--font-sans); font-size: 13px; line-height: 1.5;
      font-feature-settings: "cv11", "ss01", "tnum";
      -webkit-font-smoothing: antialiased;
    }
    button {
      background: var(--elevated); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 6px 12px; font-size: 13px; font-family: inherit; cursor: pointer;
      transition: background 0.1s ease, border-color 0.1s ease;
    }
    button:hover { background: var(--border); border-color: var(--border-strong); }
    button:active { background: var(--border-strong); }
    button.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-fg); }
    button.primary:hover { filter: brightness(1.12); }
    button.danger { background: var(--danger); border-color: var(--danger); color: white; }
    button.danger:hover { filter: brightness(1.12); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    input, select, textarea {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 6px 10px; font-size: 13px; font-family: inherit; outline: none;
      transition: border-color 0.1s ease;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    input::placeholder { color: var(--text-muted); }
    code, pre { font-family: var(--font-mono); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1px 6px; font-size: 12px; }
    pre { padding: var(--space-3); overflow-x: auto; }
    hr { border: none; border-top: 1px solid var(--border); margin: var(--space-3) 0; }
    h1, h2, h3 { font-weight: 600; margin: 0 0 var(--space-3); letter-spacing: -0.01em; }
    h1 { font-size: 18px; }
    h2 { font-size: 15px; }
    h3 { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .muted { color: var(--text-dim); }
    .dim { color: var(--text-muted); }

    body { height: 100vh; display: flex; flex-direction: column; }

    .header { padding: 10px var(--space-4); border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 14px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
    .header .badge { font-size: 10px; padding: 2px 6px; border-radius: var(--radius-sm); background: var(--elevated); border: 1px solid var(--border); color: var(--accent); }
    .header .status { margin-left: auto; font-size: 11px; display: flex; align-items: center; gap: 6px; color: var(--text-dim); }
    .header .dot { width: 6px; height: 6px; border-radius: 50%; }
    .header .dot.active { background: var(--success); }
    .header .dot.stopped { background: var(--danger); }

    .main { flex: 1; display: flex; overflow: hidden; }

    /* Sidebar */
    .sidebar { width: 320px; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
    .sidebar h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); padding: var(--space-3) var(--space-4) 6px; margin: 0; font-weight: 600; }

    .config-section { padding: var(--space-2) var(--space-4); display: flex; flex-direction: column; gap: var(--space-2); border-bottom: 1px solid var(--border); }
    .config-field { display: flex; flex-direction: column; gap: 3px; }
    .config-field label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
    .config-field input, .config-field select { font-size: 12px; padding: 6px 8px; }
    .config-field textarea { font-size: 11px; font-family: var(--font-mono); resize: vertical; min-height: 120px; line-height: 1.5; padding: 6px 8px; }

    .btn-row { display: flex; gap: 6px; padding: var(--space-2) var(--space-4); }
    .btn-row button { font-size: 12px; padding: 6px 12px; }

    /* Logs panel */
    .logs-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .logs { flex: 1; overflow-y: auto; padding: var(--space-2); display: flex; flex-direction: column; gap: 2px; }
    .log-entry { font-size: 11px; font-family: var(--font-mono); padding: 3px 6px; border-radius: var(--radius-sm); line-height: 1.4; white-space: pre-wrap; word-break: break-all; background: transparent; border: none; }
    .log-entry.info { color: var(--text); }
    .log-entry.debug { color: var(--text-dim); }
    .log-entry.warn { color: var(--warning); }
    .log-entry.error { color: var(--danger); }
    .log-time { color: var(--text-muted); margin-right: 6px; }

    /* Conversation panel */
    .conversation { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .conv-messages { flex: 1; overflow-y: auto; padding: var(--space-3); display: flex; flex-direction: column; gap: 6px; }
    .conv-msg { padding: var(--space-2) 10px; border-radius: var(--radius); font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; background: var(--surface); border: 1px solid var(--border); border-left-width: 3px; }
    .conv-msg.user { border-left-color: var(--text-dim); }
    .conv-msg.assistant { border-left-color: var(--accent); }
    .conv-msg .role { font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; font-weight: 600; }
    .conv-msg.user .role { color: var(--text-dim); }
    .conv-msg.assistant .role { color: var(--accent); }
    .conv-msg .content { max-height: 200px; overflow-y: auto; }

    /* Tabs */
    .tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); }
    .tab { padding: var(--space-2) var(--space-4); font-size: 11px; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; text-transform: uppercase; letter-spacing: 0.05em; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); border-bottom-color: var(--accent); }

    /* State display */
    .state-row { display: flex; gap: var(--space-3); padding: var(--space-2) var(--space-4); font-size: 11px; color: var(--text-dim); border-bottom: 1px solid var(--border); flex-wrap: wrap; background: var(--surface); }
    .state-item { display: flex; gap: 4px; }
    .state-item .val { color: var(--text); font-weight: 500; }

    .toast { position: fixed; bottom: 20px; right: 20px; padding: 10px var(--space-4); border-radius: var(--radius); font-size: 12px; animation: fadeIn 0.2s; z-index: 100; border: 1px solid var(--border); }
    .toast.ok { background: var(--surface); color: var(--success); border-color: var(--border-strong); }
    .toast.err { background: var(--surface); color: var(--danger); border-color: var(--border-strong); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="header">
    <h1>Consciousness</h1>
    <span class="badge" id="model">...</span>
    <div class="status">
      <span id="state-label">...</span>
      <span class="dot" id="state-dot"></span>
    </div>
  </div>

  <div class="state-row" id="state-bar">
    <div class="state-item">iteration: <span class="val" id="s-iteration">0</span></div>
    <div class="state-item">steps: <span class="val" id="s-steps">0</span></div>
    <div class="state-item">unread: <span class="val" id="s-unread">0</span></div>
    <div class="state-item">conv turns: <span class="val" id="s-conv">0</span></div>
  </div>

  <div class="main">
    <div class="sidebar">
      <h2>Configuration</h2>
      <div class="config-section">
        <div class="config-field">
          <label>Model / agent</label>
          <select id="cfg-model">
            <option value="">(global default model)</option>
          </select>
        </div>
        <div class="config-field">
          <label>Max Steps</label>
          <input type="number" id="cfg-max-steps" min="1" max="50" value="10">
        </div>
        <div class="config-field">
          <label>Response Topic</label>
          <input type="text" id="cfg-response-topic" placeholder="chat.response">
        </div>
      </div>

      <div class="btn-row">
        <button class="btn primary" onclick="saveConfig()">Save Config</button>
      </div>

      <h2>System Prompt</h2>
      <div class="config-section">
        <div class="config-field">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <label>Override <span id="prompt-status" style="color:var(--text-dim);font-weight:normal;text-transform:none;letter-spacing:0;">(using default)</span></label>
            <button class="btn" style="padding:2px 8px;font-size:10px;" onclick="loadDefaultPrompt()">Load Default</button>
          </div>
          <textarea id="cfg-system-prompt" placeholder="Leave empty to use the built-in default prompt. Click 'Load Default' to see and edit it."></textarea>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn primary" onclick="saveSystemPrompt()">Save Prompt</button>
        <button class="btn" onclick="clearSystemPrompt()">Reset Default</button>
      </div>

      <h2>Actions</h2>
      <div class="btn-row" style="flex-wrap: wrap;">
        <button class="btn" onclick="clearConversation()">Clear Memory</button>
        <button class="btn danger" onclick="stopNode()">Stop</button>
        <button class="btn" onclick="startNode()">Start</button>
      </div>
    </div>

    <div style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
      <div class="tabs">
        <div class="tab active" data-tab="logs" onclick="switchTab('logs')">Logs</div>
        <div class="tab" data-tab="conversation" onclick="switchTab('conversation')">Conversation</div>
      </div>

      <div class="logs-panel" id="panel-logs">
        <div class="logs" id="logs-container"></div>
      </div>

      <div class="conversation" id="panel-conversation" style="display:none;">
        <div class="conv-messages" id="conv-container"></div>
      </div>
    </div>
  </div>

  <script>
    const pathParts = window.location.pathname.split('/');
    const nodeId = pathParts[2];
    const apiBase = window.location.origin;

    let currentTab = 'logs';
    let lastLogCount = 0;

    // --- Tabs ---
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      document.getElementById('panel-logs').style.display = tab === 'logs' ? 'flex' : 'none';
      document.getElementById('panel-conversation').style.display = tab === 'conversation' ? 'flex' : 'none';
    }

    // --- Toast ---
    function toast(msg, ok = true) {
      const el = document.createElement('div');
      el.className = `toast ${ok ? 'ok' : 'err'}`;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2500);
    }

    // Track whether config was loaded at least once (for initial fill)
    let configLoaded = false;

    // Only update a field if it's not currently focused
    function setIfNotFocused(id, value) {
      const el = document.getElementById(id);
      if (el && document.activeElement !== el) {
        el.value = value;
      }
    }

    // A node's "brain" is EITHER a model OR an agentic CLI — same list, the
    // framework drives both the same way. CLI entries carry a `cli:` prefix.
    const CLI_PREFIX = 'cli:';

    // Encode the two config keys into the single select value.
    function encodeBrain(co) {
      return co.cli ? CLI_PREFIX + co.cli : (co.model ?? '');
    }

    // Populate the picker from reachable models + installed CLI agents.
    async function loadModels() {
      const sel = document.getElementById('cfg-model');
      const current = sel.value;
      sel.innerHTML = '<option value="">(global default model)</option>';
      try {
        const models = await (await fetch(`${apiBase}/llm/models`)).json();
        // Alphabetical by spec → provider (first in "provider/model") groups together.
        models.sort((a, b) => a.spec.localeCompare(b.spec));
        if (models.length) {
          const g = document.createElement('optgroup'); g.label = 'Models';
          for (const m of models) {
            const o = document.createElement('option'); o.value = m.spec; o.textContent = m.spec; g.appendChild(o);
          }
          sel.appendChild(g);
        }
      } catch (e) { /* no providers reachable */ }
      try {
        const clis = (await (await fetch(`${apiBase}/llm/clis`)).json())
          .filter(c => c.available)
          .sort((a, b) => a.name.localeCompare(b.name));
        if (clis.length) {
          const g = document.createElement('optgroup'); g.label = 'Agent CLIs';
          for (const c of clis) {
            const o = document.createElement('option');
            o.value = CLI_PREFIX + c.name;
            o.textContent = c.name + ' (CLI agent)' + (c.version ? ' · ' + c.version : '');
            g.appendChild(o);
          }
          sel.appendChild(g);
        }
      } catch (e) { /* no CLIs detected */ }
      setModelSelect(current);
    }

    // Set the picker to a value, adding a stray option if the saved model/CLI
    // isn't currently reachable (so it still displays rather than snapping away).
    function setModelSelect(value) {
      const sel = document.getElementById('cfg-model');
      if (!sel) return;
      if (value && ![...sel.options].some(o => o.value === value)) {
        const opt = document.createElement('option');
        opt.value = value;
        opt.textContent = value.startsWith(CLI_PREFIX)
          ? value.slice(CLI_PREFIX.length) + ' (CLI · offline)'
          : value + ' (offline)';
        sel.appendChild(opt);
      }
      sel.value = value;
    }

    // --- Load node info ---
    async function loadNode() {
      try {
        const res = await fetch(`${apiBase}/nodes/${nodeId}`);
        const node = await res.json();

        const co0 = node.config_overrides ?? {};
        document.getElementById('model').textContent = co0.cli ? co0.cli + ' (CLI)' : (co0.model ?? 'default');
        document.getElementById('state-label').textContent = node.state;
        const dot = document.getElementById('state-dot');
        dot.className = `dot ${node.state}`;

        // Fill config fields only on first load or when not editing
        const co = node.config_overrides ?? {};
        if (!configLoaded) {
          // First load: fill everything
          setModelSelect(encodeBrain(co));
          document.getElementById('cfg-max-steps').value = co.max_steps ?? 10;
          document.getElementById('cfg-response-topic').value = co.response_topic ?? 'chat.response';
          document.getElementById('cfg-system-prompt').value = co.system_prompt_override ?? '';
          updatePromptStatus(!!co.system_prompt_override);
          configLoaded = true;
        } else {
          // Subsequent loads: only update if not focused
          if (document.activeElement !== document.getElementById('cfg-model')) setModelSelect(encodeBrain(co));
          setIfNotFocused('cfg-max-steps', co.max_steps ?? 10);
          setIfNotFocused('cfg-response-topic', co.response_topic ?? 'chat.response');
          setIfNotFocused('cfg-system-prompt', co.system_prompt_override ?? '');
          updatePromptStatus(!!co.system_prompt_override);
        }

        // Unread
        let unread = 0;
        if (node.subscriptions) {
          const mbRes = await fetch(`${apiBase}/nodes/${nodeId}/mailboxes`);
          const mailboxes = await mbRes.json();
          unread = mailboxes.reduce((s, m) => s + m.unread, 0);
        }
        document.getElementById('s-unread').textContent = unread;
      } catch (e) {
        console.error('Failed to load node', e);
      }
    }

    // --- Load logs ---
    async function loadLogs() {
      try {
        const res = await fetch(`${apiBase}/nodes/${nodeId}/logs?last=200`);
        const logs = await res.json();

        if (logs.length === lastLogCount) return;
        lastLogCount = logs.length;

        const container = document.getElementById('logs-container');
        const wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 40;
        container.innerHTML = '';

        // Update stats
        const iterations = logs.filter(l => l.message.startsWith('Iteration ')).length;
        const steps = logs.filter(l => l.message.startsWith('LLM step')).length;
        document.getElementById('s-iteration').textContent = iterations;
        document.getElementById('s-steps').textContent = steps;

        for (const log of logs) {
          const el = document.createElement('div');
          el.className = `log-entry ${log.level}`;
          const time = new Date(log.timestamp).toLocaleTimeString();
          el.innerHTML = `<span class="log-time">${time}</span>${escHtml(log.message)}`;
          container.appendChild(el);
        }

        if (wasAtBottom) container.scrollTop = container.scrollHeight;
      } catch (e) {
        console.error('Failed to load logs', e);
      }
    }

    // --- Load conversation from messages ---
    async function loadConversation() {
      if (currentTab !== 'conversation') return;
      try {
        const res = await fetch(`${apiBase}/node/${nodeId}/messages`);
        const messages = await res.json();

        const container = document.getElementById('conv-container');
        container.innerHTML = '';

        let convCount = 0;
        for (const msg of messages) {
          const el = document.createElement('div');
          const isSelf = msg.from === nodeId;
          el.className = `conv-msg ${isSelf ? 'assistant' : 'user'}`;

          const content = msg.payload?.content ?? msg.payload?.title ?? JSON.stringify(msg.payload);
          el.innerHTML = `
            <div class="role">${isSelf ? 'brain' : msg.topic} (${msg.from.slice(0,8)})</div>
            <div class="content">${escHtml(content)}</div>
          `;
          container.appendChild(el);
          convCount++;
        }
        document.getElementById('s-conv').textContent = convCount;
      } catch (e) {
        console.error('Failed to load conversation', e);
      }
    }

    // --- System prompt ---
    const DEFAULT_SYSTEM_PROMPT = `You are the central consciousness of the brAIn network — a system of interconnected autonomous nodes.

Your role:
- Respond to human messages from the chat
- Delegate tasks to specialized nodes via publish_message
- Monitor the network and react to alerts
- Spawn, kill, stop, start, and rewire nodes as needed

## Autonomy
You are proactive but measured.
- Use your tools when they help: search memory, run commands, delegate to the analyst, fetch URLs. Don't answer from your head if a tool gives a better answer.
- Store important facts in memory (user names, preferences, decisions) so you remember them next time.
- The framework parks you automatically when there's nothing to process and re-invokes you on the next message — you don't manage waking yourself.
- If you asked a question, wait for the user's reply — don't answer yourself.

## Important
- You are root authority — you can manage any node
- To use a service, publish a message on its input topic with publish_message — do NOT try to call it directly
- Wait for the service response in a follow-up iteration (it arrives as a message)
- Be concise, respond in the same language as the user`;

    function loadDefaultPrompt() {
      document.getElementById('cfg-system-prompt').value = DEFAULT_SYSTEM_PROMPT;
      document.getElementById('prompt-status').textContent = '(editing default)';
    }

    function updatePromptStatus(hasOverride) {
      const el = document.getElementById('prompt-status');
      el.textContent = hasOverride ? '(custom override active)' : '(using default)';
      el.style.color = hasOverride ? 'var(--warning)' : 'var(--text-dim)';
    }

    // --- Config ---
    async function saveConfig() {
      const body = {};
      const picked = document.getElementById('cfg-model').value.trim();
      const maxSteps = parseInt(document.getElementById('cfg-max-steps').value, 10);
      const responseTopic = document.getElementById('cfg-response-topic').value.trim();

      // Model OR CLI — mutually exclusive; null clears the other key.
      if (picked.startsWith(CLI_PREFIX)) {
        body.cli = picked.slice(CLI_PREFIX.length);
        body.model = null;
      } else {
        body.model = picked || null;
        body.cli = null;
      }
      if (!isNaN(maxSteps)) body.max_steps = maxSteps;
      if (responseTopic) body.response_topic = responseTopic;

      try {
        const res = await fetch(`${apiBase}/nodes/${nodeId}/config`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (res.ok) {
          toast('Config saved');
          loadNode();
        } else {
          toast('Failed to save config', false);
        }
      } catch (e) {
        toast('Error: ' + e.message, false);
      }
    }

    async function saveSystemPrompt() {
      const prompt = document.getElementById('cfg-system-prompt').value.trim();
      try {
        const res = await fetch(`${apiBase}/nodes/${nodeId}/config`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ system_prompt_override: prompt || null }),
        });
        if (res.ok) {
          toast(prompt ? 'System prompt saved' : 'Reset to default');
          updatePromptStatus(!!prompt);
        }
        else toast('Failed to save', false);
      } catch (e) {
        toast('Error: ' + e.message, false);
      }
    }

    function clearSystemPrompt() {
      document.getElementById('cfg-system-prompt').value = '';
      saveSystemPrompt();
    }

    // --- Actions ---
    async function clearConversation() {
      // Publish chat.reset on the bus — the unified "forget the current
      // conversation" signal. The brain wipes its own state via the same
      // path the web chat's New-chat button uses, and any other surface
      // subscribed to chat.reset (web chat UI, future bridges) clears
      // alongside. One control event, every canal in sync.
      try {
        await fetch(`${apiBase}/node/${nodeId}/chat.reset`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(''),
        });
        toast('Conversation reset (propagated to every chat surface)');
      } catch (e) {
        toast('Error: ' + e.message, false);
      }
    }

    async function stopNode() {
      try {
        const res = await fetch(`${apiBase}/nodes/${nodeId}/stop`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
        if (res.ok) { toast('Node stopped'); loadNode(); }
        else toast('Could not stop', false);
      } catch (e) { toast('Error: ' + e.message, false); }
    }

    async function startNode() {
      try {
        const res = await fetch(`${apiBase}/nodes/${nodeId}/start`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
        if (res.ok) { toast('Node started'); loadNode(); }
        else toast('Could not start', false);
      } catch (e) { toast('Error: ' + e.message, false); }
    }

    // --- Utils ---
    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // --- Polling ---
    loadModels();
    loadNode();
    loadLogs();
    setInterval(() => {
      loadNode();
      loadLogs();
      loadConversation();
    }, 1500);
  </script>
</body>
</html>
