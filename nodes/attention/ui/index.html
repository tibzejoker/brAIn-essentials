<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>attention — who addresses the network</title>
  <style>
    :root {
      --bg: #0A0A0A;
      --surface: #111111;
      --elevated: #1A1A1A;
      --border: #262626;
      --border-strong: #333333;
      --text: #EDEDED;
      --text-dim: #A1A1A1;
      --text-muted: #707070;
      --accent: #EDEDED;
      --accent-fg: #0A0A0A;
      --danger: #F84E4E;
      --success: #4ADE80;
      --warning: #FBBF24;
      --radius-sm: 4px;
      --radius: 6px;
      --radius-lg: 10px;
      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-5: 24px; --space-6: 32px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      --font-mono: ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: var(--font-sans); font-size: 13px; line-height: 1.5;
      font-feature-settings: "cv11", "ss01", "tnum";
      -webkit-font-smoothing: antialiased;
    }
    button {
      background: var(--elevated); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 6px 12px; font-size: 13px; font-family: inherit; cursor: pointer;
      transition: background 0.1s ease, border-color 0.1s ease;
    }
    button:hover { background: var(--border); border-color: var(--border-strong); }
    button:active { background: var(--border-strong); }
    button.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-fg); }
    button.primary:hover { filter: brightness(1.12); }
    button.danger { background: var(--danger); border-color: var(--danger); color: white; }
    button.danger:hover { filter: brightness(1.12); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    input, select, textarea {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 6px 10px; font-size: 13px; font-family: inherit; outline: none;
      transition: border-color 0.1s ease;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    input::placeholder { color: var(--text-muted); }
    code, pre { font-family: var(--font-mono); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1px 6px; font-size: 12px; }
    pre { padding: var(--space-3); overflow-x: auto; }
    hr { border: none; border-top: 1px solid var(--border); margin: var(--space-3) 0; }
    h1, h2, h3 { font-weight: 600; margin: 0 0 var(--space-3); letter-spacing: -0.01em; }
    h1 { font-size: 18px; }
    h2 { font-size: 15px; }
    h3 { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .muted { color: var(--text-dim); }
    .dim { color: var(--text-muted); }

    html, body { height: 100%; }
    body { display: flex; flex-direction: column; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px var(--space-4); border-bottom: 1px solid var(--border); background: var(--surface);
    }
    header h1 { font-size: 14px; color: var(--text); letter-spacing: -0.01em; margin: 0; font-weight: 600; }
    .hint { font-size: 11px; color: var(--text-dim); }

    main { flex: 1; display: grid; grid-template-rows: 200px 1fr; gap: 1px; background: var(--border); min-height: 0; }
    .attn {
      background: var(--bg); overflow-y: auto; padding: var(--space-2) var(--space-3); min-height: 0;
    }
    .attn .empty { color: var(--text-dim); font-style: italic; padding: var(--space-2); }
    .item {
      border: 1px solid var(--border); border-left: 3px solid var(--accent);
      padding: 6px 10px; margin-bottom: 6px; background: var(--surface);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }
    .item.addressed { border-left-color: var(--success); }
    .item .head {
      display: flex; gap: var(--space-2); align-items: baseline;
      font-size: 12px; color: var(--text-dim);
    }
    .item .badge {
      text-transform: uppercase; font-size: 10px; letter-spacing: 0.05em;
      padding: 1px 6px; border-radius: var(--radius-sm);
      background: var(--elevated); border: 1px solid var(--border); color: var(--accent);
    }
    .item.addressed .badge { color: var(--success); }
    .item .src { color: var(--text); font-weight: 500; }
    .item .text { color: var(--text); margin-top: 2px; }
    .item .response { color: var(--success); margin-top: 2px; font-style: italic; }
    .item .summary { color: var(--text-dim); font-size: 11px; margin-top: 2px; }

    iframe { border: 0; width: 100%; height: 100%; display: block; background: var(--bg); }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>attention</h1>
      <div class="hint">
        Bridges every intent from the correlator below onto the brAIn bus.
        Cyan items = the speaker looked at the camera (addressing the network).
        <span id="meta" style="color:var(--text-dim)"></span>
      </div>
    </div>
    <div class="hint" id="status">connecting…</div>
  </header>

  <main>
    <section class="attn" id="attn-feed">
      <div class="empty">No intents seen yet. Speak from the voice UI in the panel below.</div>
    </section>
    <iframe id="intent-iframe" src="http://localhost:5176/" title="intent UI"></iframe>
  </main>

  <script>
    // The node UI is served by the brAIn API at /nodes/<id>/ui/. We
    // derive the id from the URL so the UI works regardless of the
    // instance id the runtime assigned.
    const match = window.location.pathname.match(/\/nodes\/([^/]+)\//);
    const NODE_ID = match ? match[1] : "attention";
    const MESSAGES_URL = `/nodes/${NODE_ID}/ui/messages`;

    const feed = document.getElementById("attn-feed");
    const status = document.getElementById("status");
    const meta = document.getElementById("meta");

    const knownIds = new Set();

    async function tick() {
      try {
        const res = await fetch(MESSAGES_URL);
        if (!res.ok) throw new Error(`${res.status}`);
        const msgs = await res.json();
        const entries = msgs
          .filter((m) => m.topic === "intent.output" && m.metadata)
          .map((m) => ({ msg: m, md: m.metadata }));
        status.textContent = `${entries.length} intent(s) forwarded`;
        render(entries);
      } catch (e) {
        status.textContent = `messages endpoint unreachable (${e.message})`;
      }
    }

    function render(entries) {
      if (entries.length === 0) return;
      feed.querySelector(".empty")?.remove();
      for (const entry of entries) {
        const key = entry.md.intent_id;
        if (knownIds.has(key)) continue;
        knownIds.add(key);
        feed.insertBefore(card(entry), feed.firstChild);
      }
      while (feed.children.length > 100) feed.lastChild.remove();
    }

    function card(entry) {
      const { md } = entry;
      const isCam = md.target_kind === "camera";
      const el = document.createElement("div");
      el.className = `item${isCam ? " addressed" : ""}`;
      const src = md.source ?? "?";
      const tgt = md.target_kind;
      const tgtName = md.target ? ` → ${md.target}` : "";
      const ts = (md.intent_ts ?? "").slice(11, 19);
      el.innerHTML = `
        <div class="head">
          <span class="badge">${escapeHtml(tgt || "?")}${escapeHtml(tgtName)}</span>
          <span class="src">${escapeHtml(src)}</span>
          <span>${escapeHtml(ts)}</span>
          <span>conf ${Math.round((md.confidence ?? 0) * 100)}%</span>
        </div>
        <div class="text">${escapeHtml(md.text || "")}</div>
      `;
      return el;
    }

    function escapeHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, (c) => (
        { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
      ));
    }

    tick();
    setInterval(tick, 1500);
  </script>
</body>
</html>
