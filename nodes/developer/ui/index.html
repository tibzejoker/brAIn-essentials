<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>developer — author brAIn nodes at runtime</title>
  <!-- Monaco (VSCode's editor) for file content. marked + hljs for the
       lighter contexts: transcripts as markdown + git diffs as `language=diff`. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #a78bfa;
      --ok: #22c55e;
      --warn: #f59e0b;
      --error: #ef4444;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font: 13px/1.45 ui-sans-serif, system-ui, sans-serif; }
    body { display: flex; flex-direction: column; overflow: hidden; }

    header {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--panel);
      flex-shrink: 0;
    }
    header h1 { font-size: 14px; color: var(--accent); letter-spacing: 0.02em; }
    .hint { font-size: 11px; color: var(--muted); }
    .status { margin-left: auto; font-size: 11px; color: var(--muted); }

    main {
      flex: 1; display: grid; min-height: 0;
      grid-template-columns: 320px 1fr 380px;
      grid-template-rows: 1fr 220px;
      grid-template-areas:
        "list   tree     compose"
        "list   progress compose";
      gap: 1px; background: var(--border);
    }
    .pane { background: var(--bg); display: flex; flex-direction: column; min-height: 0; min-width: 0; }
    .pane h2 {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--muted); padding: 8px 12px; background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .pane h2 .actions { margin-left: auto; display: flex; gap: 4px; }
    .pane h2 button { font-size: 10px; padding: 2px 8px; }
    .pane-body { flex: 1; overflow: auto; min-height: 0; }

    .list { grid-area: list; }
    .tree { grid-area: tree; }
    .progress { grid-area: progress; }
    .compose { grid-area: compose; }

    select, input[type=text], textarea, button {
      background: var(--bg); color: var(--text); border: 1px solid var(--border);
      border-radius: 4px; font: inherit; font-size: 12px; padding: 6px 10px;
      font-family: inherit;
    }
    select:hover, button:hover:not(:disabled) { border-color: var(--accent); }
    button { cursor: pointer; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.primary { background: var(--accent); color: #0f172a; border-color: var(--accent); font-weight: 600; }
    button.primary:hover:not(:disabled) { background: #8b5cf6; }
    button.ghost { background: transparent; color: var(--muted); }
    button.ghost:hover { color: var(--text); }
    textarea { width: 100%; resize: none; padding: 8px 10px; line-height: 1.4; }

    /* — workspaces list — */
    .ws { padding: 10px 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
    .ws:hover { background: var(--panel); }
    .ws.selected { background: var(--panel-2); border-left: 2px solid var(--accent); padding-left: 10px; }
    .ws .top { display: flex; align-items: center; gap: 6px; }
    .ws .slug { font-family: ui-monospace, monospace; font-size: 11px; color: var(--muted); }
    .ws .name { font-weight: 600; font-size: 13px; flex: 1; }
    .ws .badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
    .badge { font-size: 10px; padding: 1px 6px; border-radius: 8px; border: 1px solid var(--border); }
    .badge.ok { color: var(--ok); border-color: rgba(34,197,94,0.4); }
    .badge.warn { color: var(--warn); border-color: rgba(245,158,11,0.4); }
    .badge.muted { color: var(--muted); }
    .badge.live { color: var(--accent); border-color: rgba(167,139,250,0.4); }

    /* — file tree — */
    .tree-list { padding: 8px 12px; font: 12px ui-monospace, monospace; }
    .tree-list .row { display: flex; gap: 6px; padding: 1px 0; }
    .tree-list .row .icon { width: 16px; flex-shrink: 0; color: var(--muted); }
    .tree-list .row.dir > .icon { color: var(--accent); }
    .tree-list .row .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tree-list .row .meta { color: var(--muted); font-size: 10px; }
    .tree-list .indent { padding-left: 16px; border-left: 1px dashed var(--border); margin-left: 6px; }

    /* — progress — */
    .progress-log {
      padding: 8px 12px; font: 11px ui-monospace, monospace;
      white-space: pre-wrap; word-break: break-word;
    }
    .progress-line { padding: 1px 0; color: var(--muted); }
    .progress-line.event { color: var(--accent); font-weight: 600; }
    .progress-line.error { color: var(--error); }

    /* — compose — */
    .compose-body { padding: 12px; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
    .compose-body label { font-size: 11px; color: var(--muted); }
    .row-flex { display: flex; gap: 8px; align-items: center; }
    .row-flex select { flex: 1; }

    .empty { color: var(--muted); font-style: italic; padding: 16px; text-align: center; font-size: 12px; }

    /* — tabs (in tree pane h2) — */
    .tabs { display: flex; gap: 0; flex: 1; }
    .tab {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em;
      padding: 4px 10px; border-radius: 4px; cursor: pointer;
      color: var(--muted); background: transparent; border: 1px solid transparent;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); background: var(--bg); border-color: var(--border); }

    /* — clickable rows (file tree, transcripts, git) — */
    .tree-list .row.file, .tree-list .row.entry { cursor: pointer; }
    .tree-list .row.file:hover, .tree-list .row.entry:hover { background: var(--panel); }

    /* — modal — */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: none; align-items: center; justify-content: center; z-index: 100;
    }
    .modal-bg.show { display: flex; }
    .modal {
      background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
      width: min(1100px, 92vw); height: 86vh; display: flex; flex-direction: column;
    }
    .modal-head {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; border-bottom: 1px solid var(--border);
    }
    .modal-head .title { font-weight: 600; font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .modal-head .meta { color: var(--muted); font-size: 11px; }
    .modal-body {
      padding: 12px 14px; overflow: auto; flex: 1;
      font: 12px ui-monospace, monospace; white-space: pre-wrap; word-break: break-word;
    }
    .modal-tabs { display: flex; gap: 4px; }
    .modal-tabs .tab { font-size: 10px; padding: 3px 10px; }
    .modal-body pre { margin: 0; }
    .modal-body pre code.hljs { padding: 12px; border-radius: 6px; display: block; }
    /* — markdown render — */
    .modal-body.md { font: 13px/1.5 ui-sans-serif, system-ui, sans-serif; white-space: normal; }
    .modal-body.md h1, .modal-body.md h2, .modal-body.md h3 {
      color: var(--accent); margin: 16px 0 6px; font-weight: 600;
    }
    .modal-body.md h2 { font-size: 14px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
    .modal-body.md p, .modal-body.md ul, .modal-body.md ol { margin: 6px 0; }
    .modal-body.md ul, .modal-body.md ol { padding-left: 22px; }
    .modal-body.md code { font-family: ui-monospace, monospace; font-size: 11px; background: var(--panel-2); padding: 1px 4px; border-radius: 3px; }
    .modal-body.md pre code { padding: 12px; }
    /* — file history list inside modal — */
    .commits { padding: 0; }
    .commits .row {
      display: flex; gap: 8px; padding: 6px 12px;
      border-bottom: 1px solid var(--border); cursor: pointer;
      font: 12px ui-monospace, monospace;
    }
    .commits .row:hover { background: var(--panel); }
    .commits .row .hash { color: var(--accent); width: 70px; flex-shrink: 0; }
    .commits .row .subject { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .commits .row .when { color: var(--muted); font-size: 10px; }
    /* — diff coloring (hljs handles most) — */
    .modal-body.diff { white-space: pre; }
    /* — Monaco host fills the modal body. The body uses flex:1 inside
         a fixed-height .modal, so it has real pixels for absolute
         positioning to resolve against. */
    .modal-body.monaco { padding: 0; position: relative; }
    .modal-body.monaco > #monaco-host { position: absolute; inset: 0; }
  </style>
</head>
<body>
  <header>
    <h1>developer</h1>
    <div class="hint">Author brAIn nodes at runtime via a code-writing CLI.</div>
    <div class="status" id="status">connecting…</div>
  </header>

  <main>
    <!-- workspaces list -->
    <div class="pane list">
      <h2>Workspaces
        <div class="actions">
          <button id="refresh-list" class="ghost" title="Re-scan nodes/_dynamic/">↻</button>
        </div>
      </h2>
      <div class="pane-body" id="ws-list">
        <div class="empty">No workspaces yet.</div>
      </div>
    </div>

    <!-- file tree / transcripts / git history -->
    <div class="pane tree">
      <h2>
        <span id="tree-title" style="margin-right: 12px;">Files</span>
        <div class="tabs">
          <button class="tab active" data-tab="files" id="tab-files">Files</button>
          <button class="tab" data-tab="transcripts" id="tab-transcripts">Transcripts</button>
        </div>
        <div class="actions">
          <button id="refresh-tree" class="ghost" title="Refresh">↻</button>
        </div>
      </h2>
      <div class="pane-body" id="tree-body">
        <div class="empty">Pick a workspace on the left.</div>
      </div>
    </div>

    <!-- progress -->
    <div class="pane progress">
      <h2><span id="progress-title">Live progress</span>
        <div class="actions">
          <button id="clear-progress" class="ghost" title="Clear log">clear</button>
        </div>
      </h2>
      <div class="pane-body progress-log" id="progress-body">
        <div class="empty">Idle. Author or improve a node to see the CLI's output.</div>
      </div>
    </div>

    <!-- modal: file content / file history / diff / transcript -->
    <div class="modal-bg" id="modal-bg">
      <div class="modal">
        <div class="modal-head">
          <span class="title" id="modal-title"></span>
          <div class="modal-tabs" id="modal-tabs" style="display:none;">
            <button class="tab active" data-mtab="content" id="mtab-content">Content</button>
            <button class="tab" data-mtab="history" id="mtab-history">History</button>
          </div>
          <span class="meta" id="modal-meta"></span>
          <button class="ghost" id="modal-close" title="Close">✕</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>

    <!-- compose -->
    <div class="pane compose">
      <h2>Compose</h2>
      <div class="compose-body">
        <div class="row-flex">
          <label for="cli-select">CLI</label>
          <select id="cli-select"><option>loading…</option></select>
        </div>
        <label for="prompt">Description (create) or change request (improve)</label>
        <textarea id="prompt" rows="6" placeholder="A node that subscribes to clock.tick and prints the time…"></textarea>
        <div class="row-flex" style="gap: 6px;">
          <button id="btn-create" class="primary" style="flex: 1;">+ Create</button>
          <button id="btn-improve" id="improve" style="flex: 1;" disabled>↗ Improve selected</button>
        </div>
        <div class="hint" id="compose-status"></div>
      </div>
    </div>
  </main>

  <script>
    const nodeId = window.location.pathname.split('/nodes/')[1]?.split('/ui')[0];
    const apiBase = window.location.origin;

    const els = {
      status: document.getElementById('status'),
      wsList: document.getElementById('ws-list'),
      treeTitle: document.getElementById('tree-title'),
      treeBody: document.getElementById('tree-body'),
      refreshList: document.getElementById('refresh-list'),
      refreshTree: document.getElementById('refresh-tree'),
      progressTitle: document.getElementById('progress-title'),
      progressBody: document.getElementById('progress-body'),
      clearProgress: document.getElementById('clear-progress'),
      cliSelect: document.getElementById('cli-select'),
      prompt: document.getElementById('prompt'),
      btnCreate: document.getElementById('btn-create'),
      btnImprove: document.getElementById('btn-improve'),
      composeStatus: document.getElementById('compose-status'),
      tabFiles: document.getElementById('tab-files'),
      tabTranscripts: document.getElementById('tab-transcripts'),
      modalBg: document.getElementById('modal-bg'),
      modalTitle: document.getElementById('modal-title'),
      modalMeta: document.getElementById('modal-meta'),
      modalBody: document.getElementById('modal-body'),
      modalClose: document.getElementById('modal-close'),
      modalTabs: document.getElementById('modal-tabs'),
      mtabContent: document.getElementById('mtab-content'),
      mtabHistory: document.getElementById('mtab-history'),
    };

    let selectedSlug = null;
    let lastMessageId = null;
    let workspaces = [];
    let activeTab = 'files'; // 'files' | 'transcripts'
    // Modal state machine — fields populated per kind:
    //   { kind: 'file', slug, path, view: 'content' | 'history' | 'diff', hash? }
    //   { kind: 'transcript', slug, file }
    let modal = null;

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[c]));
    }

    function fmtTime(ms) {
      if (!ms) return '';
      const d = new Date(ms);
      return d.toLocaleTimeString();
    }

    // ── outgoing: drive our own subscriptions via /send with system origin ────
    async function send(topic, body, criticality = 4) {
      try {
        const payload = {
          topic,
          content: typeof body === 'string' ? body : JSON.stringify(body),
          criticality,
          from: 'system.dev-ui',
          metadata: typeof body === 'object' ? body : undefined,
        };
        const res = await fetch(`${apiBase}/nodes/${nodeId}/ui/send`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
      } catch (e) {
        els.composeStatus.textContent = `send failed: ${e.message}`;
      }
    }

    // ── polling ───────────────────────────────────────────────────────────────
    async function pollMessages() {
      try {
        const res = await fetch(`${apiBase}/nodes/${nodeId}/ui/messages`);
        if (!res.ok) { els.status.textContent = 'node not running'; return; }
        const messages = await res.json();
        els.status.textContent = `${messages.length} bus events tracked`;
        let startIdx = 0;
        if (lastMessageId) {
          const idx = messages.findIndex((m) => m.id === lastMessageId);
          if (idx >= 0) startIdx = idx + 1;
        }
        for (const msg of messages.slice(startIdx)) {
          dispatch(msg);
          lastMessageId = msg.id;
        }
      } catch (e) {
        els.status.textContent = 'disconnected';
      }
    }

    function dispatch(msg) {
      const meta = msg.metadata || {};
      switch (msg.topic) {
        case 'dev.workspaces':
          if (Array.isArray(meta.items)) renderWorkspaces(meta.items);
          break;
        case 'dev.files':
          if (meta.slug === selectedSlug && Array.isArray(meta.tree) && activeTab === 'files') renderTree(meta.tree);
          break;
        case 'dev.file.content':
          if (modal?.kind === 'file' && modal.view === 'content' && modal.slug === meta.slug && modal.path === meta.path) {
            renderModalCode(meta.path, meta.content || `error: ${meta.error || 'unknown'}`, meta.size);
          }
          break;
        case 'dev.history':
          if ((meta.slug === selectedSlug || !meta.slug) && Array.isArray(meta.entries) && activeTab === 'transcripts') {
            renderTranscripts(meta.entries.filter((e) => !meta.slug || e.slug === selectedSlug));
          }
          break;
        case 'dev.history.content':
          if (modal?.kind === 'transcript' && modal.file === meta.file) {
            renderModalMarkdown(meta.file, meta.content || `error: ${meta.error || 'unknown'}`);
          }
          break;
        case 'dev.file.history':
          if (modal?.kind === 'file' && modal.view === 'history' && modal.slug === meta.slug && modal.path === meta.path) {
            renderModalHistory(meta.entries || [], meta.error);
          }
          break;
        case 'dev.file.diff':
          if (modal?.kind === 'file' && modal.view === 'diff' && modal.slug === meta.slug && modal.path === meta.path && modal.hash === meta.hash) {
            renderModalDiff(meta.diff || `error: ${meta.error || 'unknown'}`);
          }
          break;
        case 'dev.cli.available':
          if (Array.isArray(meta.clis)) renderClis(meta.clis, meta.default);
          break;
        case 'dev.progress':
          if (!meta.slug) break;
          if (selectedSlug && meta.slug !== selectedSlug) break;
          appendProgress(meta);
          break;
        case 'dev.spawned':
          appendProgress({
            slug: meta.slug,
            lines: [`★ spawned instance ${meta.instance_id ?? '?'} for type ${meta.type_name ?? '?'}` + (meta.error ? ` (error: ${meta.error})` : '')],
            ts: msg.timestamp ? new Date(msg.timestamp).toISOString() : null,
          }, 'event');
          requestList();
          break;
        case 'dev.result':
          appendProgress({
            slug: tryParseSlug(msg),
            lines: [`▣ result: ${(msg.payload?.content || '').slice(0, 200)}`],
          }, 'event');
          requestList();
          break;
      }
    }

    function tryParseSlug(msg) {
      try {
        const p = JSON.parse(msg.payload?.content ?? '');
        return p?.slug ?? null;
      } catch { return null; }
    }

    // ── workspaces panel ──────────────────────────────────────────────────────
    function renderWorkspaces(items) {
      workspaces = items;
      if (items.length === 0) {
        els.wsList.innerHTML = '<div class="empty">No workspaces yet — use Compose to create one.</div>';
        els.btnImprove.disabled = true;
        return;
      }
      els.wsList.innerHTML = '';
      for (const ws of items) {
        const div = document.createElement('div');
        div.className = `ws${selectedSlug === ws.slug ? ' selected' : ''}`;
        div.dataset.slug = ws.slug;
        const badges = [];
        if (ws.in_progress) badges.push('<span class="badge warn">working…</span>');
        if (ws.registered) badges.push('<span class="badge ok">registered</span>');
        else badges.push('<span class="badge muted">not yet registered</span>');
        if (ws.instance_id) badges.push('<span class="badge live">live</span>');
        div.innerHTML = `
          <div class="top">
            <span class="name">${escapeHtml(ws.type_name || ws.slug)}</span>
          </div>
          <div class="slug">${escapeHtml(ws.slug)} · ${ws.files_count} files</div>
          <div class="badges">${badges.join('')}</div>
        `;
        div.addEventListener('click', () => selectWorkspace(ws.slug));
        els.wsList.appendChild(div);
      }
      els.btnImprove.disabled = !selectedSlug || !workspaces.find((w) => w.slug === selectedSlug);
    }

    function selectWorkspace(slug) {
      selectedSlug = slug;
      const ws = workspaces.find((w) => w.slug === slug);
      els.treeTitle.textContent = ws?.type_name ? ws.type_name : slug;
      els.progressTitle.textContent = `Live progress — ${slug}`;
      els.btnImprove.disabled = false;
      refreshActiveTab();
      // highlight in the list without re-fetching
      els.wsList.querySelectorAll('.ws').forEach((el) => {
        el.classList.toggle('selected', el.dataset.slug === slug);
      });
    }

    // ── tree panel ────────────────────────────────────────────────────────────
    function renderTree(tree) {
      if (!tree.length) {
        els.treeBody.innerHTML = '<div class="empty">Empty workspace.</div>';
        return;
      }
      const wrap = document.createElement('div');
      wrap.className = 'tree-list';
      wrap.appendChild(renderNodes(tree));
      els.treeBody.replaceChildren(wrap);
    }

    function renderNodes(nodes) {
      const frag = document.createDocumentFragment();
      for (const n of nodes) {
        const row = document.createElement('div');
        row.className = `row ${n.is_dir ? 'dir' : 'file'}`;
        const icon = n.is_dir ? '▸' : '·';
        const meta = n.is_dir ? '' : (n.size ? ` ${n.size} B` : '');
        row.innerHTML = `<span class="icon">${icon}</span><span class="name">${escapeHtml(n.name)}</span><span class="meta">${meta}</span>`;
        if (!n.is_dir) {
          row.title = `Open ${n.path}`;
          row.addEventListener('click', () => openFile(n.path, n.size));
        }
        frag.appendChild(row);
        if (n.is_dir && n.children?.length) {
          const child = document.createElement('div');
          child.className = 'indent';
          child.appendChild(renderNodes(n.children));
          frag.appendChild(child);
        }
      }
      return frag;
    }

    function renderTranscripts(entries) {
      if (!entries.length) {
        els.treeBody.innerHTML = '<div class="empty">No transcripts yet — they appear after the first authoring run.</div>';
        return;
      }
      const wrap = document.createElement('div');
      wrap.className = 'tree-list';
      for (const e of entries) {
        const row = document.createElement('div');
        row.className = 'row entry';
        row.title = `Open ${e.file}`;
        row.innerHTML = `<span class="icon">·</span><span class="name">${escapeHtml(e.mode || '?')} attempt ${escapeHtml(String(e.attempt ?? '?'))}</span><span class="meta">${escapeHtml(new Date(e.ts).toLocaleString())} · ${e.size} B</span>`;
        row.addEventListener('click', () => openTranscript(e.slug, e.file));
        wrap.appendChild(row);
      }
      els.treeBody.replaceChildren(wrap);
    }

    // ── modal ────────────────────────────────────────────────────────────────
    function langFromPath(p) {
      const ext = (p.split('.').pop() || '').toLowerCase();
      const map = {
        ts: 'typescript', tsx: 'typescript', js: 'javascript', mjs: 'javascript',
        json: 'json', html: 'xml', css: 'css', md: 'markdown', yaml: 'yaml', yml: 'yaml',
        sh: 'bash', py: 'python',
      };
      return map[ext] || 'plaintext';
    }
    let monacoReady = null; // Promise resolved with `monaco` global once loaded.
    let monacoEditor = null;
    function loadMonaco() {
      if (monacoReady) return monacoReady;
      monacoReady = new Promise((resolve) => {
        // AMD loader is already on window via the loader.js <script> tag.
        require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
        require(['vs/editor/editor.main'], () => resolve(window.monaco));
      });
      return monacoReady;
    }
    function disposeMonaco() {
      if (monacoEditor) { try { monacoEditor.dispose(); } catch {} monacoEditor = null; }
    }
    async function renderModalCode(path, content, size) {
      disposeMonaco();
      els.modalBody.className = 'modal-body monaco';
      els.modalBody.innerHTML = '<div id="monaco-host"></div>';
      const lang = langFromPath(path);
      els.modalMeta.textContent = size ? `${size} B · ${lang}` : lang;
      const monaco = await loadMonaco();
      // Modal might have been closed during the async load — bail out cleanly.
      if (!modal || modal.kind !== 'file' || modal.view !== 'content' || modal.path !== path) return;
      monacoEditor = monaco.editor.create(document.getElementById('monaco-host'), {
        value: content,
        language: lang,
        theme: 'vs-dark',
        readOnly: true,
        automaticLayout: true,
        minimap: { enabled: true },
        fontSize: 12,
        scrollBeyondLastLine: false,
        renderLineHighlight: 'line',
      });
    }
    function renderModalMarkdown(title, content) {
      disposeMonaco();
      els.modalBody.className = 'modal-body md';
      try {
        els.modalBody.innerHTML = marked.parse(content);
        els.modalBody.querySelectorAll('pre code').forEach((b) => { try { hljs.highlightElement(b); } catch {} });
      } catch {
        els.modalBody.textContent = content;
      }
      els.modalMeta.textContent = '';
    }
    function renderModalHistory(entries, error) {
      disposeMonaco();
      els.modalBody.className = 'modal-body';
      if (error && !entries.length) {
        els.modalBody.innerHTML = `<div class="empty">${escapeHtml(error)}</div>`;
        return;
      }
      if (!entries.length) {
        els.modalBody.innerHTML = '<div class="empty">No commits touched this file yet.</div>';
        return;
      }
      const wrap = document.createElement('div');
      wrap.className = 'commits';
      for (const c of entries) {
        const row = document.createElement('div');
        row.className = 'row';
        const date = c.date ? new Date(c.date).toLocaleString() : '';
        row.innerHTML = `<span class="hash">${escapeHtml(c.hash)}</span><span class="subject">${escapeHtml(c.subject)}</span><span class="when">${escapeHtml(date)}</span>`;
        row.addEventListener('click', () => openDiff(c.hash));
        wrap.appendChild(row);
      }
      els.modalBody.replaceChildren(wrap);
      els.modalMeta.textContent = `${entries.length} commit(s)`;
    }
    function renderModalDiff(diff) {
      disposeMonaco();
      els.modalBody.className = 'modal-body diff';
      els.modalBody.innerHTML = '<pre><code class="language-diff"></code></pre>';
      const codeEl = els.modalBody.querySelector('code');
      codeEl.textContent = diff;
      try { hljs.highlightElement(codeEl); } catch {}
    }
    function setModalChrome() {
      els.modalTitle.textContent = modal?.kind === 'file' ? modal.path : (modal?.kind === 'transcript' ? modal.file : '');
      // tabs only for file mode
      if (modal?.kind === 'file') {
        els.modalTabs.style.display = 'flex';
        els.mtabContent.classList.toggle('active', modal.view === 'content');
        els.mtabHistory.classList.toggle('active', modal.view === 'history' || modal.view === 'diff');
      } else {
        els.modalTabs.style.display = 'none';
      }
    }
    function loadingBody(text) {
      els.modalBody.className = 'modal-body';
      els.modalBody.innerHTML = `<div class="empty">${escapeHtml(text)}</div>`;
    }
    function closeModal() {
      els.modalBg.classList.remove('show');
      modal = null;
      disposeMonaco();
    }
    els.modalClose.addEventListener('click', closeModal);
    els.modalBg.addEventListener('click', (e) => { if (e.target === els.modalBg) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    function openFile(filePath, size) {
      if (!selectedSlug) return;
      modal = { kind: 'file', slug: selectedSlug, path: filePath, view: 'content' };
      setModalChrome();
      els.modalMeta.textContent = size ? `${size} B` : '';
      loadingBody('loading…');
      els.modalBg.classList.add('show');
      send('dev.files.read', { slug: selectedSlug, path: filePath });
    }
    function openFileHistory() {
      if (!modal || modal.kind !== 'file') return;
      modal.view = 'history';
      modal.hash = null;
      setModalChrome();
      loadingBody('loading…');
      send('dev.files.history', { slug: modal.slug, path: modal.path });
    }
    function openDiff(hash) {
      if (!modal || modal.kind !== 'file') return;
      modal.view = 'diff';
      modal.hash = hash;
      setModalChrome();
      loadingBody(`loading diff @ ${hash}…`);
      send('dev.files.diff', { slug: modal.slug, path: modal.path, hash });
    }
    function openTranscript(slug, file) {
      modal = { kind: 'transcript', slug, file };
      setModalChrome();
      loadingBody('loading…');
      els.modalBg.classList.add('show');
      send('dev.history.read', { slug, file });
    }

    els.mtabContent.addEventListener('click', () => {
      if (!modal || modal.kind !== 'file') return;
      modal.view = 'content';
      setModalChrome();
      loadingBody('loading…');
      send('dev.files.read', { slug: modal.slug, path: modal.path });
    });
    els.mtabHistory.addEventListener('click', openFileHistory);

    // ── tabs ─────────────────────────────────────────────────────────────────
    function setActiveTab(tab) {
      activeTab = tab;
      els.tabFiles.classList.toggle('active', tab === 'files');
      els.tabTranscripts.classList.toggle('active', tab === 'transcripts');
      if (!selectedSlug) { els.treeBody.innerHTML = '<div class="empty">Pick a workspace on the left.</div>'; return; }
      els.treeBody.innerHTML = '<div class="empty">loading…</div>';
      refreshActiveTab();
    }
    function refreshActiveTab() {
      if (!selectedSlug) return;
      if (activeTab === 'files') send('dev.files.tree', { slug: selectedSlug });
      else if (activeTab === 'transcripts') send('dev.history.list', { slug: selectedSlug });
    }
    els.tabFiles.addEventListener('click', () => setActiveTab('files'));
    els.tabTranscripts.addEventListener('click', () => setActiveTab('transcripts'));

    // ── progress panel ────────────────────────────────────────────────────────
    function appendProgress(meta, klass = '') {
      const empty = els.progressBody.querySelector('.empty');
      empty?.remove();
      const lines = Array.isArray(meta.lines) ? meta.lines : [String(meta.lines ?? '')];
      const t = meta.ts ? `[${new Date(meta.ts).toLocaleTimeString()}]` : '';
      for (const line of lines) {
        const div = document.createElement('div');
        const cssClass = klass || (line.includes('[stderr]') || line.includes('error') ? 'error' : '');
        div.className = `progress-line ${cssClass}`;
        div.textContent = `${t} ${line}`.trim();
        els.progressBody.appendChild(div);
      }
      while (els.progressBody.children.length > 400) els.progressBody.firstChild.remove();
      els.progressBody.scrollTop = els.progressBody.scrollHeight;
    }

    els.clearProgress.addEventListener('click', () => {
      els.progressBody.innerHTML = '<div class="empty">Idle.</div>';
    });

    // ── CLI dropdown ──────────────────────────────────────────────────────────
    function renderClis(clis, def) {
      els.cliSelect.innerHTML = '';
      if (!clis.length) {
        els.cliSelect.innerHTML = '<option value="">none available</option>';
        els.btnCreate.disabled = true;
        els.btnImprove.disabled = true;
        return;
      }
      for (const c of clis) {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        if (c === def) opt.selected = true;
        els.cliSelect.appendChild(opt);
      }
      els.btnCreate.disabled = false;
    }

    // ── triggers ──────────────────────────────────────────────────────────────
    function requestList() { send('dev.workspaces.list', {}); }
    function requestTree() { refreshActiveTab(); }
    function requestClis() { send('dev.cli.list', {}); }

    els.refreshList.addEventListener('click', requestList);
    els.refreshTree.addEventListener('click', requestTree);

    els.btnCreate.addEventListener('click', () => {
      const text = els.prompt.value.trim();
      if (!text) return;
      const cli = els.cliSelect.value;
      els.composeStatus.textContent = 'submitted';
      send('dev.request', { content: text, cli }, 5);
      // The send envelope sets metadata to the body object — handler picks
      // metadata.cli over config_overrides. We also forward `content` as
      // the canonical free-text payload.
      els.prompt.value = '';
    });

    els.btnImprove.addEventListener('click', () => {
      if (!selectedSlug) return;
      const text = els.prompt.value.trim();
      if (!text) return;
      const cli = els.cliSelect.value;
      els.composeStatus.textContent = `improving ${selectedSlug}`;
      send('dev.improve', { slug: selectedSlug, request: text, cli }, 5);
      els.prompt.value = '';
    });

    // ── boot ──────────────────────────────────────────────────────────────────
    requestClis();
    requestList();
    setInterval(pollMessages, 1500);
    setInterval(requestList, 8000); // periodic refresh — picks up external spawn/kill
    pollMessages();
  </script>
</body>
</html>
