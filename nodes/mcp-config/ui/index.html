<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>brAIn — MCP Config</title>
  <style>
    :root {
      --bg: #0A0A0A;
      --surface: #111111;
      --elevated: #1A1A1A;
      --border: #262626;
      --border-strong: #333333;
      --text: #EDEDED;
      --text-dim: #A1A1A1;
      --text-muted: #707070;
      --accent: #EDEDED;
      --accent-fg: #0A0A0A;
      --danger: #F84E4E;
      --success: #4ADE80;
      --warning: #FBBF24;
      --radius-sm: 4px;
      --radius: 6px;
      --radius-lg: 10px;
      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-5: 24px; --space-6: 32px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      --font-mono: ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: var(--font-sans); font-size: 13px; line-height: 1.5;
      font-feature-settings: "cv11", "ss01", "tnum";
      -webkit-font-smoothing: antialiased;
    }
    button {
      background: var(--elevated); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 6px 12px; font-size: 13px; font-family: inherit; cursor: pointer;
      transition: background 0.1s ease, border-color 0.1s ease;
    }
    button:hover { background: var(--border); border-color: var(--border-strong); }
    button:active { background: var(--border-strong); }
    button.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-fg); }
    button.primary:hover { filter: brightness(1.12); }
    button.danger { background: var(--danger); border-color: var(--danger); color: white; }
    button.danger:hover { filter: brightness(1.12); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    input, select, textarea {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 6px 10px; font-size: 13px; font-family: inherit; outline: none;
      transition: border-color 0.1s ease;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    input::placeholder { color: var(--text-muted); }
    code, pre { font-family: var(--font-mono); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1px 6px; font-size: 12px; }
    pre { padding: var(--space-3); overflow-x: auto; }
    hr { border: none; border-top: 1px solid var(--border); margin: var(--space-3) 0; }
    h1, h2, h3 { font-weight: 600; margin: 0 0 var(--space-3); letter-spacing: -0.01em; }
    h1 { font-size: 18px; }
    h2 { font-size: 15px; }
    h3 { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .muted { color: var(--text-dim); }
    .dim { color: var(--text-muted); }

    body { height: 100vh; display: flex; flex-direction: column; }

    .header { padding: 10px var(--space-4); border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 14px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
    .header .badge { font-size: 10px; padding: 2px 6px; border-radius: var(--radius-sm); background: var(--elevated); border: 1px solid var(--border); color: var(--accent); }
    .header .grow { flex: 1; }
    .header .saved { font-size: 11px; color: var(--success); opacity: 0; transition: opacity 0.2s; }
    .header .saved.show { opacity: 1; }

    .main { flex: 1; display: grid; grid-template-columns: 1fr 360px; overflow: hidden; }

    /* Editor pane */
    .editor { display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); }
    .editor h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); padding: var(--space-3) var(--space-4) 6px; margin: 0; font-weight: 600; }
    .editor textarea {
      flex: 1; background: var(--bg); border: none; border-radius: 0; color: var(--text);
      padding: 10px var(--space-4); font-size: 12px; font-family: var(--font-mono);
      resize: none; line-height: 1.55;
    }
    .editor textarea:focus { outline: none; border: none; }

    .toolbar { padding: var(--space-2) var(--space-4); border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: var(--space-2); align-items: center; }
    .toolbar button { font-size: 12px; padding: 6px 12px; }

    .err {
      flex: 1; padding: 6px 10px; border-radius: var(--radius-sm);
      background: var(--surface); border: 1px solid var(--border);
      color: var(--danger); font-size: 11px; font-family: var(--font-mono);
      white-space: pre-wrap; word-break: break-word;
    }

    /* Children pane */
    .children { display: flex; flex-direction: column; overflow: hidden; }
    .children h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); padding: var(--space-3) var(--space-4) 6px; margin: 0; font-weight: 600; }
    .child-list { flex: 1; overflow-y: auto; }

    .child {
      padding: 10px var(--space-4); border-bottom: 1px solid var(--border); display: flex;
      flex-direction: column; gap: 4px;
    }
    .child .row { display: flex; align-items: center; gap: var(--space-2); }
    .child .name { font-weight: 500; color: var(--text); }
    .child .transport {
      font-size: 10px; padding: 1px 6px; border-radius: var(--radius-sm); font-family: var(--font-mono);
      background: var(--elevated); border: 1px solid var(--border); color: var(--text-dim);
    }
    .child .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .child .dot.connected { background: var(--success); }
    .child .dot.error { background: var(--danger); }
    .child .dot.pending-auth { background: var(--warning); }
    .child .dot.unconfigured { background: var(--text-muted); }
    .child .meta { font-size: 11px; color: var(--text-dim); margin-left: auto; }
    .child .endpoint { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); word-break: break-all; }
    .child .err-msg {
      font-size: 11px; color: var(--danger); background: var(--surface); border: 1px solid var(--border);
      padding: 4px 6px; border-radius: var(--radius-sm); font-family: var(--font-mono); word-break: break-word;
    }
    .child .auth-btn {
      align-self: flex-start; font-size: 11px; padding: 4px 8px; border-radius: var(--radius-sm);
      background: var(--elevated); border: 1px solid var(--border); color: var(--warning); text-decoration: none;
    }
    .child .auth-btn:hover { background: var(--border); }
    .child .tools {
      font-size: 11px; color: var(--text-dim); display: flex; flex-wrap: wrap; gap: 4px;
      margin-top: 2px;
    }
    .child .tool {
      padding: 1px 6px; border-radius: var(--radius-sm); background: var(--elevated);
      border: 1px solid var(--border);
      font-family: var(--font-mono); font-size: 10px; color: var(--accent);
    }
    .empty { padding: var(--space-5); text-align: center; color: var(--text-dim); font-size: 12px; }
  </style>
</head>
<body>
  <header class="header">
    <h1>MCP Config</h1>
    <span class="badge" id="alias-count">0 servers</span>
    <span class="grow"></span>
    <span class="saved" id="saved-flash">Saved · children reconciling</span>
  </header>

  <div class="main">
    <section class="editor">
      <h2>mcpServers JSON</h2>
      <textarea id="json-editor" spellcheck="false"></textarea>
      <div class="toolbar">
        <button class="btn" id="btn-template">Insert template</button>
        <span class="err" id="err" style="display:none"></span>
        <span style="flex:1"></span>
        <button class="btn primary" id="btn-save">Save & reconcile</button>
      </div>
    </section>

    <section class="children">
      <h2>Spawned servers</h2>
      <div class="child-list" id="child-list">
        <div class="empty">No servers configured. Add an entry to <code>mcpServers</code> and save.</div>
      </div>
    </section>
  </div>

  <script>
    const NODE_ID = location.pathname.match(/\/nodes\/([^/]+)\/ui/)?.[1];
    if (!NODE_ID) { document.body.innerHTML = "<p style='padding:20px'>Could not detect node id from URL.</p>"; throw new Error("no node id"); }

    const TEMPLATE = JSON.stringify({
      mcpServers: {
        notion: { type: "http", url: "https://mcp.notion.com/mcp" },
        filesystem: { command: "npx", args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"] },
      },
    }, null, 2);

    const editor = document.getElementById("json-editor");
    const aliasCount = document.getElementById("alias-count");
    const errEl = document.getElementById("err");
    const savedFlash = document.getElementById("saved-flash");
    const childList = document.getElementById("child-list");

    function showErr(msg) { errEl.textContent = msg; errEl.style.display = msg ? "" : "none"; }
    function flashSaved() {
      savedFlash.classList.add("show");
      setTimeout(() => savedFlash.classList.remove("show"), 3000);
    }

    function validate(text) {
      let parsed;
      try { parsed = JSON.parse(text); } catch (e) { throw new Error("Invalid JSON: " + e.message); }
      if (typeof parsed !== "object" || parsed === null) throw new Error("Top-level must be an object");
      const map = parsed.mcpServers;
      if (typeof map !== "object" || map === null || Array.isArray(map)) {
        throw new Error("Expected `mcpServers` to be an object map");
      }
      for (const [alias, spec] of Object.entries(map)) {
        if (typeof spec !== "object" || spec === null) throw new Error(`mcpServers.${alias}: must be an object`);
        const cmd = spec.command, url = spec.url;
        if (!cmd && !url) throw new Error(`mcpServers.${alias}: needs either \`command\` (stdio) or \`url\` (http/sse/ws)`);
      }
      return map;
    }

    let focused = false;
    editor.addEventListener("focus", () => { focused = true; });
    editor.addEventListener("blur", () => { focused = false; });
    editor.addEventListener("input", () => {
      try { validate(editor.value); showErr(""); }
      catch (e) { showErr(e.message); }
      const cur = (() => { try { return Object.keys(JSON.parse(editor.value).mcpServers ?? {}).length; } catch { return 0; } })();
      aliasCount.textContent = `${cur} server${cur === 1 ? "" : "s"}`;
    });

    document.getElementById("btn-template").onclick = () => {
      editor.value = TEMPLATE; editor.dispatchEvent(new Event("input"));
    };

    document.getElementById("btn-save").onclick = async () => {
      let map;
      try { map = validate(editor.value); }
      catch (e) { showErr(e.message); return; }
      try {
        const r = await fetch(`/nodes/${NODE_ID}/config`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mcpServers: map }),
        });
        if (!r.ok) throw new Error((await r.json()).error || `HTTP ${r.status}`);
        flashSaved();
        showErr("");
      } catch (e) { showErr("Save failed: " + e.message); }
    };

    // Periodic refresh: load own config + each child's status snapshot.
    async function refresh() {
      if (focused) return;
      try {
        const net = await (await fetch("/network")).json();
        const self = net.nodes.find(n => n.id === NODE_ID);
        const children = net.nodes.filter(n => n.spawned_by === NODE_ID);

        // Sync editor from server config (only when not focused).
        const map = self?.config_overrides?.mcpServers ?? {};
        const serialized = JSON.stringify({ mcpServers: map }, null, 2);
        if (editor.value !== serialized) {
          editor.value = serialized;
          aliasCount.textContent = `${Object.keys(map).length} server${Object.keys(map).length === 1 ? "" : "s"}`;
        }

        // Pull each child's last status from the bus.
        const statuses = await Promise.all(children.map(async c => {
          const alias = c.config_overrides?.alias ?? c.name?.replace(/^mcp-/, "") ?? "?";
          try {
            const msgs = await (await fetch(`/network/messages?topic=mcp.${alias}.status&last=5`)).json();
            const last = msgs.filter(m => m.from === c.id).pop();
            return { alias, child: c, snap: last?.metadata ?? null };
          } catch { return { alias, child: c, snap: null }; }
        }));

        renderChildren(statuses);
      } catch { /* silent */ }
    }

    function renderChildren(statuses) {
      if (statuses.length === 0) {
        childList.innerHTML = `<div class="empty">No servers spawned yet.</div>`;
        return;
      }
      childList.innerHTML = statuses.map(({ alias, child, snap }) => {
        const status = snap?.status ?? "unconfigured";
        const transport = snap?.transport ?? child.config_overrides?.spec?.type ?? "?";
        const endpoint = snap?.url ?? snap?.command ?? "(unknown)";
        const tools = snap?.tools ?? [];
        const errMsg = status === "error" ? snap?.error : null;
        const authUrl = status === "pending-auth" ? snap?.authorizationUrl : null;
        return `
          <div class="child">
            <div class="row">
              <span class="dot ${status}"></span>
              <span class="name">${escapeHtml(alias)}</span>
              <span class="transport">${escapeHtml(transport)}</span>
              ${status === "connected" ? `<span class="meta">${tools.length} tool${tools.length === 1 ? "" : "s"}</span>` : ""}
              ${status === "error" ? `<span class="meta" style="color:var(--danger)">error</span>` : ""}
              ${status === "pending-auth" ? `<span class="meta" style="color:var(--warning)">OAuth needed</span>` : ""}
            </div>
            <div class="endpoint">${escapeHtml(endpoint)}</div>
            ${errMsg ? `<div class="err-msg">${escapeHtml(errMsg)}</div>` : ""}
            ${authUrl ? `<a class="auth-btn" target="_blank" rel="noopener noreferrer" href="${escapeAttr(authUrl)}">Authorize in browser →</a>` : ""}
            ${tools.length > 0 ? `<div class="tools">${tools.map(t => `<span class="tool" title="${escapeAttr(t.description)}">${escapeHtml(t.name)}</span>`).join("")}</div>` : ""}
          </div>
        `;
      }).join("");
    }

    function escapeHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
    function escapeAttr(s) { return escapeHtml(s).replace(/`/g, "&#96;"); }

    refresh();
    setInterval(refresh, 2000);
  </script>
</body>
</html>
